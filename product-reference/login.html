<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>BudgetFlow — 로그인</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body { background: var(--surface); }
    .login-wrap {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px 24px;
    }
    .login-card {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 36px 40px;
      width: 100%; max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,.06);
    }
    .login-brand { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .login-brand svg { width: 22px; height: 22px; }
    .login-brand-name { font-size: 18px; font-weight: 800; letter-spacing: -.03em; }
    .login-subtitle { font-size: 13.5px; color: var(--muted); margin-bottom: 28px; }
    .login-form { display: flex; flex-direction: column; gap: 16px; }
    .btn-login { width: 100%; height: 44px; font-size: 14.5px; font-weight: 600; margin-top: 4px; }
    .login-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0; font-size: 12px; color: var(--subtle);
    }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .cognito-hint {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 12px 14px;
      background: var(--info-bg); border: 1px solid var(--info-border);
      border-radius: var(--radius); font-size: 12.5px; color: var(--info-fg); line-height: 1.6;
    }
    .cognito-hint svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; }
    .mock-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 8px; border-radius: 3px;
      background: var(--warning-bg); border: 1px solid var(--warning-border);
      color: var(--warning-fg); font-size: 11px; font-weight: 700;
      letter-spacing: .03em; margin-bottom: 8px;
    }
    .error-msg {
      padding: 10px 12px; background: var(--danger-bg);
      border: 1px solid var(--danger-border); border-radius: var(--radius);
      font-size: 12.5px; color: var(--danger-fg);
    }
    .hidden { display: none !important; }
    .login-footer { margin-top: 24px; font-size: 12px; color: var(--subtle); text-align: center; }
    .login-footer a { color: var(--muted); text-decoration: underline; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-brand">
        <svg viewBox="0 0 20 20" fill="none">
          <rect x="2" y="12" width="4" height="6" rx="1" fill="currentColor"/>
          <rect x="8" y="7" width="4" height="11" rx="1" fill="currentColor"/>
          <rect x="14" y="3" width="4" height="15" rx="1" fill="currentColor"/>
        </svg>
        <span class="login-brand-name">BudgetFlow</span>
      </div>
      <p class="login-subtitle">팀 예산 정산 자동화 서비스</p>

      <div class="mock-badge">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="8" cy="8" r="6"/><line x1="8" y1="5" x2="8" y2="8"/><circle cx="8" cy="11" r=".5" fill="currentColor"/>
        </svg>
        MOCK 인증 모드
      </div>

      <form class="login-form" id="loginForm" novalidate>
        <p id="errEmpty"   class="error-msg hidden">이메일과 비밀번호를 모두 입력해 주세요.</p>
        <p id="errEmail"   class="error-msg hidden">올바른 이메일 형식을 입력해 주세요.</p>
        <p id="errPw"      class="error-msg hidden">비밀번호를 입력해 주세요.</p>

        <div class="form-group">
          <label class="form-label" for="email">이메일</label>
          <input id="email" type="email" class="form-input" placeholder="admin@budgetflow.kr" autocomplete="username"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">비밀번호</label>
          <input id="password" type="password" class="form-input" placeholder="••••••••" autocomplete="current-password"/>
        </div>

        <button type="submit" class="btn btn-primary btn-login" id="submitBtn">
          <svg id="btnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
          <span id="btnLabel">Mock 인증으로 로그인</span>
        </button>
      </form>

      <div class="login-divider">또는</div>

      <div class="cognito-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>현재는 Mock 인증을 사용합니다. 프로덕션 전환 시 <strong>AWS Cognito</strong> 기반 OAuth 인증으로 교체됩니다. 임의 이메일과 비밀번호 입력 시 로그인됩니다.</span>
      </div>
    </div>

    <div class="login-footer">
      <a href="index.html">← 프로토타입 홈으로</a>
    </div>
  </div>

  <script>
    const form     = document.getElementById('loginForm');
    const emailEl  = document.getElementById('email');
    const pwEl     = document.getElementById('password');
    const btnLabel = document.getElementById('btnLabel');
    const btnIcon  = document.getElementById('btnIcon');
    const submitBtn= document.getElementById('submitBtn');
    const errIds   = ['errEmpty','errEmail','errPw'];

    function hideAllErrors() {
      errIds.forEach(function(id){ document.getElementById(id).classList.add('hidden'); });
      emailEl.classList.remove('error'); pwEl.classList.remove('error');
    }
    function showError(id, target) {
      hideAllErrors();
      document.getElementById(id).classList.remove('hidden');
      if (target) { target.classList.add('error'); target.focus(); }
    }

    form.addEventListener('submit', function(e){
      e.preventDefault();
      hideAllErrors();
      var email = emailEl.value.trim();
      var pw    = pwEl.value;
      if (!email && !pw) { showError('errEmpty', emailEl); return; }
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('errEmail', emailEl); return; }
      if (!pw) { showError('errPw', pwEl); return; }

      submitBtn.disabled = true;
      btnLabel.textContent = '로그인 중…';
      btnIcon.style.animation = 'spin .8s linear infinite';
      setTimeout(function(){ window.location.href = 'projects.html'; }, 900);
    });

    [emailEl, pwEl].forEach(function(el){
      el.addEventListener('input', function(){ el.classList.remove('error'); hideAllErrors(); });
    });
  </script>
</body>
</html>
