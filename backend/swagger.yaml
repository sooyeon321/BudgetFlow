openapi: 3.0.0
info:
  title: BudgetFlow API 명세서 (MVP)
  version: 1.0.0
  description: BudgetFlow 단일 백엔드 서버의 API 명세서입니다.
paths:
  /api/expenses/{expenseId}/approve:
    patch:
      summary: 지출 정보 수정 후 승인
      tags:
        - Expense
      parameters:
        - in: path
          name: expenseId
          required: true
          schema:
            type: string
          description: 승인할 지출 내역 ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - date
                - amount
                - categoryId
                - description
                - merchant
                - payerName
              properties:
                date:
                  type: string
                  format: date
                  example: "2026-05-24"
                amount:
                  type: integer
                  example: 25500
                categoryId:
                  type: string
                  example: "cat_food_01"
                description:
                  type: string
                  example: "팀 전체 회식 음료대금"
                merchant:
                  type: string
                  example: "스타벅스 인하대점"
                payerName:
                  type: string
                  example: "홍길동"
      responses:
        200:
          description: 승인 완료된 지출 객체 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'

components:
  schemas:
    Expense:
      type: object
      properties:
        id:
          type: string
          example: "exp_9999"
        projectId:
          type: string
          example: "proj_01"
        status:
          type: string
          example: "approved"