openapi: 3.0.3
info:
  title: BudgetFlow 통합 API 명세서
  version: 1.0.0
  description: 모놀리식 아키텍처 전환에 맞춘 BudgetFlow 프론트엔드 연동용 MVP API 계약 명세서입니다.
paths:
  /api/auth/login:
    post:
      summary: 시연용 백엔드 관리자 로그인
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, example: "admin@inha.ac.kr" }
                password: { type: string, example: "password123" }
      responses:
        200:
          description: 인증 성공 토큰 반환
  /api/projects:
    get:
      summary: 프로젝트 목록 조회
      tags: [Project]
      responses:
        200: { description: 성공 }
    post:
      summary: 새 프로젝트 생성
      tags: [Project]
      responses:
        201: { description: 생성 완료 }
  /api/projects/{projectId}:
    get:
      summary: 프로젝트 상세 조회
      tags: [Project]
      responses:
        200: { description: 성공 }
  /api/projects/{projectId}/close:
    post:
      summary: 정산 마감 기능
      tags: [Project]
      responses:
        200: { description: 마감 완료 }
  /api/expenses:
    get:
      summary: 지출 목록 조회
      tags: [Expense]
      responses:
        200: { description: 성공 }
  /api/expenses/summary:
    get:
      summary: 지출 요약 통계
      tags: [Expense]
      responses:
        200: { description: 성공 }
  /api/expenses/{expenseId}/approve:
    patch:
      summary: 지출 정보 수정 후 승인
      tags: [Expense]
      responses:
        200: { description: 승인 완료 }
  /api/expenses/{expenseId}/reject:
    patch:
      summary: 지출 반려 처리
      tags: [Expense]
      responses:
        200: { description: 반려 완료 }
  /api/budget-categories:
    get:
      summary: 예산 카테고리 목록 조회
      tags: [Category]
      responses:
        200: { description: 성공 }
    post:
      summary: 새 예산 카테고리 생성
      tags: [Category]
      responses:
        201: { description: 생성 완료 }
  /api/budget-categories/{categoryId}:
    patch:
      summary: 설정 화면 카테고리 수정 관리
      tags: [Category]
      responses:
        200: { description: 수정 완료 }
  /api/projects/{projectId}/template:
    post:
      summary: 엑셀 양식 분석 요청
      tags: [Template]
      responses:
        200: { description: 분석 성공 }
  /api/projects/{projectId}/template-mapping:
    patch:
      summary: 엑셀 매핑 구조 확정
      tags: [Template]
      responses:
        200: { description: 저장 성공 }
  /api/projects/{projectId}/exports/expense-report:
    post:
      summary: 지출내역서 엑셀 파일 생성 요청
      tags: [Export]
      responses:
        200: { description: 즉시 생성 완료 및 주소 반환 }
  /api/projects/{projectId}/exports:
    get:
      summary: Export 결과 확인 폴링
      tags: [Export]
      responses:
        200: { description: 성공 }