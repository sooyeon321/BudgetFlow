openapi: 3.0.0
info:
  title: BudgetFlow API 명세서 (MVP)
  version: 1.0.0
  description: BudgetFlow 단일 백엔드 서버의 API 명세서입니다.

servers:
  - url: http://localhost:3000/api
    description: 로컬 개발 서버

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Project:
      type: object
      properties:
        id:
          type: string
          example: "proj_01"
        organizationId:
          type: string
          example: "org_inha_cs_2026"
        name:
          type: string
          example: "2026 상반기 팀 프로젝트"
        totalBudget:
          type: number
          example: 500000
        status:
          type: string
          enum: [active, closed]
          example: "active"
        slackChannelId:
          type: string
          example: "C08ABC123"
        slackChannelName:
          type: string
          example: "budgetflow-demo"
        templateFileName:
          type: string
          nullable: true
          example: "template_2026.xlsx"
        templateMappingStatus:
          type: string
          enum: [none, suggested, confirmed]
          example: "confirmed"
        createdAt:
          type: string
          example: "2026-05-01T09:00:00Z"
        closedAt:
          type: string
          nullable: true
          example: null

    Expense:
      type: object
      properties:
        id:
          type: string
          example: "exp_001"
        projectId:
          type: string
          example: "proj_01"
        categoryId:
          type: string
          example: "cat_food_01"
        date:
          type: string
          example: "2026-05-24"
        amount:
          type: number
          example: 25500
        merchant:
          type: string
          example: "스타벅스 인하대점"
        description:
          type: string
          example: "팀 전체 회식 음료대금"
        payerName:
          type: string
          example: "홍길동"
        inputChannel:
          type: string
          example: "slack"
        slackUserId:
          type: string
          example: "U08XYZ456"
        status:
          type: string
          enum: [created, processing, needs_review, approved, rejected, exported]
          example: "needs_review"
        evidenceStatus:
          type: string
          enum: [none, uploaded, ocr_completed, ocr_failed, verified]
          example: "ocr_completed"
        evidenceFileId:
          type: string
          nullable: true
          example: "ev_file_001"
        aiConfidence:
          type: number
          example: 0.87
        missingFields:
          type: array
          items:
            type: string
          example: ["categoryId"]
        reviewReason:
          type: string
          nullable: true
          example: null
        createdAt:
          type: string
          example: "2026-05-24T11:30:00Z"
        updatedAt:
          type: string
          example: "2026-05-24T11:35:00Z"

    BudgetCategory:
      type: object
      properties:
        id:
          type: string
          example: "cat_food_01"
        projectId:
          type: string
          example: "proj_01"
        name:
          type: string
          example: "식비"
        budgetLimit:
          type: number
          example: 100000
        keywords:
          type: array
          items:
            type: string
          example: ["식사", "회식", "카페", "음료"]
        approvedAmount:
          type: number
          example: 45000
        remainingAmount:
          type: number
          example: 55000
        usageRate:
          type: number
          example: 45.0
        createdAt:
          type: string
          example: "2026-05-01T09:00:00Z"

    ExpenseSummary:
      type: object
      properties:
        projectId:
          type: string
          example: "proj_01"
        totalExpenseCount:
          type: number
          example: 12
        needsReviewCount:
          type: number
          example: 3
        approvedCount:
          type: number
          example: 7
        rejectedCount:
          type: number
          example: 1
        missingEvidenceCount:
          type: number
          example: 2
        approvedAmount:
          type: number
          example: 187500

    TemplateMappingSuggestion:
      type: object
      properties:
        sourceColumn:
          type: string
          example: "사용일자"
        targetField:
          type: string
          enum: [date, merchant, description, category, amount, payerName, evidence]
          example: "date"
        confidence:
          type: number
          example: 0.95
        confirmed:
          type: boolean
          example: true

    TemplateUploadResult:
      type: object
      properties:
        projectId:
          type: string
          example: "proj_01"
        fileName:
          type: string
          example: "template_2026.xlsx"
        uploadStatus:
          type: string
          example: "uploaded"
        mappingStatus:
          type: string
          enum: [suggested, confirmed]
          example: "suggested"
        mappings:
          type: array
          items:
            $ref: '#/components/schemas/TemplateMappingSuggestion'

    ExportJob:
      type: object
      properties:
        id:
          type: string
          example: "export_001"
        projectId:
          type: string
          example: "proj_01"
        type:
          type: string
          enum: [budget_plan, expense_report]
          example: "expense_report"
        status:
          type: string
          enum: [requested, generating, completed, failed, expired]
          example: "completed"
        includedExpenseCount:
          type: number
          example: 7
        excludedReviewCount:
          type: number
          example: 3
        downloadUrl:
          type: string
          nullable: true
          example: "https://s3.amazonaws.com/budgetflow/exports/export_001.xlsx"
        expiresAt:
          type: string
          nullable: true
          example: "2026-05-31T23:59:59Z"
        createdAt:
          type: string
          example: "2026-05-24T12:00:00Z"

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: "UNAUTHORIZED"
            message:
              type: string
              example: "인증 토큰이 누락되었습니다."
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  message:
                    type: string

security:
  - bearerAuth: []

paths:

  # ──────────────────────────────────────────
  # Auth
  # ──────────────────────────────────────────
  /auth/login:
    post:
      summary: 로그인 (시연용 고정 계정)
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  example: "admin@inha.ac.kr"
                password:
                  type: string
                  example: "1234"
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              example:
                idToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                message: "시연용 로그인 성공"
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ──────────────────────────────────────────
  # Project API
  # ──────────────────────────────────────────
  /projects:
    get:
      summary: 프로젝트 목록 조회
      tags:
        - Project
      responses:
        '200':
          description: active 우선, createdAt 최신순
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
              example:
                - id: "proj_01"
                  organizationId: "org_inha_cs_2026"
                  name: "2026 상반기 팀 프로젝트"
                  totalBudget: 500000
                  status: "active"
                  slackChannelId: "C08ABC123"
                  slackChannelName: "budgetflow-demo"
                  templateFileName: "template_2026.xlsx"
                  templateMappingStatus: "confirmed"
                  createdAt: "2026-05-01T09:00:00Z"
                  closedAt: null
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: 프로젝트 생성
      tags:
        - Project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organizationId, name, totalBudget, slackChannelName]
              properties:
                organizationId:
                  type: string
                  example: "org_inha_cs_2026"
                name:
                  type: string
                  example: "2026 하반기 행사"
                totalBudget:
                  type: number
                  example: 300000
                slackChannelName:
                  type: string
                  example: "budgetflow-2nd"
                templateFileName:
                  type: string
                  example: "template_v2.xlsx"
      responses:
        '201':
          description: 생성된 프로젝트 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'

  /projects/{projectId}:
    get:
      summary: 프로젝트 단건 조회
      tags:
        - Project
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: 프로젝트 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{projectId}/close:
    post:
      summary: 정산 마감
      tags:
        - Project
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: 마감된 프로젝트 반환 (status=closed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
              example:
                id: "proj_01"
                status: "closed"
                closedAt: "2026-05-29T10:00:00Z"

  # ──────────────────────────────────────────
  # Expense API
  # ──────────────────────────────────────────
  /projects/{projectId}/expenses:
    get:
      summary: 지출 목록 조회 (5초 polling)
      tags:
        - Expense
      parameters:
        - $ref: '#/components/parameters/projectId'
        - in: query
          name: status
          schema:
            type: string
            enum: [all, created, processing, needs_review, approved, rejected, exported]
            default: "all"
          description: 지출 상태 필터
      responses:
        '200':
          description: createdAt 최신순
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Expense'
              example:
                - id: "exp_001"
                  projectId: "proj_01"
                  categoryId: "cat_food_01"
                  date: "2026-05-24"
                  amount: 25500
                  merchant: "스타벅스 인하대점"
                  description: "팀 전체 회식 음료대금"
                  payerName: "홍길동"
                  inputChannel: "slack"
                  slackUserId: "U08XYZ456"
                  status: "needs_review"
                  evidenceStatus: "ocr_completed"
                  evidenceFileId: "ev_file_001"
                  aiConfidence: 0.87
                  missingFields: ["categoryId"]
                  reviewReason: null
                  createdAt: "2026-05-24T11:30:00Z"
                  updatedAt: "2026-05-24T11:35:00Z"

  /expenses/{expenseId}/approve:
    patch:
      summary: 지출 수정 후 승인
      tags:
        - Expense
      parameters:
        - $ref: '#/components/parameters/expenseId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, amount, categoryId, description]
              properties:
                date:
                  type: string
                  format: date
                  example: "2026-05-24"
                amount:
                  type: integer
                  example: 25500
                categoryId:
                  type: string
                  example: "cat_food_01"
                description:
                  type: string
                  example: "팀 전체 회식 음료대금"
                merchant:
                  type: string
                  example: "스타벅스 인하대점"
                payerName:
                  type: string
                  example: "홍길동"
      responses:
        '200':
          description: 승인 완료 (status=approved)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'

  /expenses/{expenseId}/reject:
    patch:
      summary: 지출 반려
      tags:
        - Expense
      parameters:
        - $ref: '#/components/parameters/expenseId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: "증빙 자료가 불충분합니다."
      responses:
        '200':
          description: 반려 완료 (status=rejected)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expense'
              example:
                id: "exp_001"
                status: "rejected"
                reviewReason: "증빙 자료가 불충분합니다."
                updatedAt: "2026-05-24T14:00:00Z"

  /projects/{projectId}/expense-summary:
    get:
      summary: 지출 요약 조회
      tags:
        - Expense
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: 프로젝트 지출 집계 요약
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseSummary'
              example:
                projectId: "proj_01"
                totalExpenseCount: 12
                needsReviewCount: 3
                approvedCount: 7
                rejectedCount: 1
                missingEvidenceCount: 2
                approvedAmount: 187500

  # ──────────────────────────────────────────
  # Budget Category API
  # ──────────────────────────────────────────
  /projects/{projectId}/budget-categories:
    get:
      summary: 예산 카테고리 목록 조회
      tags:
        - Budget Category
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: 카테고리별 예산 현황
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BudgetCategory'
              example:
                - id: "cat_food_01"
                  projectId: "proj_01"
                  name: "식비"
                  budgetLimit: 100000
                  keywords: ["식사", "회식", "카페", "음료"]
                  approvedAmount: 45000
                  remainingAmount: 55000
                  usageRate: 45.0
                  createdAt: "2026-05-01T09:00:00Z"
                - id: "cat_transport_01"
                  projectId: "proj_01"
                  name: "교통비"
                  budgetLimit: 50000
                  keywords: ["택시", "버스", "지하철", "KTX"]
                  approvedAmount: 12000
                  remainingAmount: 38000
                  usageRate: 24.0
                  createdAt: "2026-05-01T09:01:00Z"

    post:
      summary: 예산 카테고리 생성
      tags:
        - Budget Category
      parameters:
        - $ref: '#/components/parameters/projectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, budgetLimit]
              properties:
                name:
                  type: string
                  example: "비품"
                budgetLimit:
                  type: number
                  example: 80000
                keywords:
                  type: array
                  items:
                    type: string
                  example: ["문구", "소모품", "사무용품"]
      responses:
        '201':
          description: 생성된 카테고리 (approvedAmount=0)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetCategory'

  /budget-categories/{categoryId}:
    patch:
      summary: 예산 카테고리 수정
      tags:
        - Budget Category
      parameters:
        - in: path
          name: categoryId
          required: true
          schema:
            type: string
          example: "cat_food_01"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, budgetLimit]
              properties:
                name:
                  type: string
                  example: "식비 (수정)"
                budgetLimit:
                  type: number
                  example: 120000
                keywords:
                  type: array
                  items:
                    type: string
                  example: ["식사", "회식", "카페", "배달"]
      responses:
        '200':
          description: 수정된 카테고리 (계산값 재산출)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BudgetCategory'

  # ──────────────────────────────────────────
  # Template API
  # ──────────────────────────────────────────
  /projects/{projectId}/template:
    post:
      summary: 엑셀 양식 업로드 및 컬럼 매핑 분석 요청
      tags:
        - Template
      parameters:
        - $ref: '#/components/parameters/projectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName]
              properties:
                fileName:
                  type: string
                  example: "template_2026.xlsx"
      responses:
        '200':
          description: 추천 컬럼 매핑 반환 (mappingStatus=suggested)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateUploadResult'
              example:
                projectId: "proj_01"
                fileName: "template_2026.xlsx"
                uploadStatus: "uploaded"
                mappingStatus: "suggested"
                mappings:
                  - sourceColumn: "사용일자"
                    targetField: "date"
                    confidence: 0.97
                    confirmed: false
                  - sourceColumn: "금액"
                    targetField: "amount"
                    confidence: 0.95
                    confirmed: false
                  - sourceColumn: "사용처"
                    targetField: "merchant"
                    confidence: 0.91
                    confirmed: false
                  - sourceColumn: "내용"
                    targetField: "description"
                    confidence: 0.88
                    confirmed: false
                  - sourceColumn: "결제자"
                    targetField: "payerName"
                    confidence: 0.93
                    confirmed: false

  /projects/{projectId}/template-mapping:
    patch:
      summary: 엑셀 컬럼 매핑 확정
      tags:
        - Template
      parameters:
        - $ref: '#/components/parameters/projectId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mappings]
              properties:
                mappings:
                  type: array
                  items:
                    $ref: '#/components/schemas/TemplateMappingSuggestion'
                  example:
                    - sourceColumn: "사용일자"
                      targetField: "date"
                      confidence: 0.97
                      confirmed: true
                    - sourceColumn: "금액"
                      targetField: "amount"
                      confidence: 0.95
                      confirmed: true
      responses:
        '200':
          description: 확정된 매핑 반환 (mappingStatus=confirmed, 모든 confirmed=true)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateUploadResult'

  # ──────────────────────────────────────────
  # Export API
  # ──────────────────────────────────────────
  /projects/{projectId}/exports:
    get:
      summary: Export job 목록 조회
      tags:
        - Export
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: createdAt 최신순
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExportJob'
              example:
                - id: "export_001"
                  projectId: "proj_01"
                  type: "expense_report"
                  status: "completed"
                  includedExpenseCount: 7
                  excludedReviewCount: 3
                  downloadUrl: "https://s3.amazonaws.com/budgetflow/exports/export_001.xlsx"
                  expiresAt: "2026-05-31T23:59:59Z"
                  createdAt: "2026-05-24T12:00:00Z"

  /projects/{projectId}/exports/expense-report:
    post:
      summary: 지출내역서 엑셀 생성 요청
      tags:
        - Export
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: 생성 완료 (status=completed, downloadUrl 포함)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
              example:
                id: "export_002"
                projectId: "proj_01"
                type: "expense_report"
                status: "completed"
                includedExpenseCount: 7
                excludedReviewCount: 3
                downloadUrl: "https://s3.amazonaws.com/budgetflow/exports/export_002.xlsx"
                expiresAt: "2026-06-05T23:59:59Z"
                createdAt: "2026-05-29T10:00:00Z"
        '202':
          description: 비동기 생성 중 (status=generating, polling 필요)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportJob'
              example:
                id: "export_003"
                status: "generating"
                downloadUrl: null
                expiresAt: null

# ──────────────────────────────────────────
# 공통 파라미터 / 응답
# ──────────────────────────────────────────
components:
  parameters:
    projectId:
      in: path
      name: projectId
      required: true
      schema:
        type: string
      example: "proj_01"
    expenseId:
      in: path
      name: expenseId
      required: true
      schema:
        type: string
      example: "exp_001"

  responses:
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "UNAUTHORIZED"
              message: "인증 토큰이 누락되었습니다."
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "NOT_FOUND"
              message: "요청한 리소스를 찾을 수 없습니다."
    BadRequest:
      description: 입력 검증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              code: "VALIDATION_ERROR"
              message: "입력값이 올바르지 않습니다."
              details:
                - field: "name"
                  message: "2자 이상 입력해야 합니다."